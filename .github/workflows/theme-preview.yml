name: Theme Preview

on:
  pull_request_target:
    branches: [master]
    paths:
      - 'themes/**'

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      # The PR checkout is treated as untrusted data only — nothing from it is
      # executed. Scripts are run from the base checkout.
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          persist-credentials: false
          allow-unsafe-pr-checkout: true

      - name: Find changed themes and generate previews
        id: preview
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd pr

          git fetch origin ${{ github.event.pull_request.base.sha }} --depth=1

          changed_themes=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} -- themes/ | \
            grep -oP '^themes/[^/]+' | sort -u || true)

          if [ -z "$changed_themes" ]; then
            echo "No theme changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "has_changes=true" >> $GITHUB_OUTPUT

          # Run the trusted (base) copy of the script, never the PR's copy.
          # It resolves the themes dir relative to its own path, so overwrite
          # the PR copy with the base copy before running it.
          cp ../base/.github/generate_theme_previews.py .github/generate_theme_previews.py
          python3 .github/generate_theme_previews.py

          echo "## Theme Preview" > ../comment.md
          echo "" >> ../comment.md

          for theme_path in $changed_themes; do
            theme_dir="$theme_path"
            if [ ! -f "${theme_dir}/theme.json" ]; then
              continue
            fi

            if [ ! -d "../base/${theme_dir}" ]; then
              badge="(new)"
            else
              badge="(updated)"
            fi

            name=$(THEME_DIR="$theme_dir" python3 -c "import json, os; print(json.load(open(os.environ['THEME_DIR'] + '/theme.json'))['name'])")
            author=$(THEME_DIR="$theme_dir" python3 -c "import json, os; print(json.load(open(os.environ['THEME_DIR'] + '/theme.json'))['author'])")
            desc=$(THEME_DIR="$theme_dir" python3 -c "import json, os; print(json.load(open(os.environ['THEME_DIR'] + '/theme.json'))['description'])")
            theme_slug=$(basename "$theme_dir")

            echo "### ${name} ${badge}" >> ../comment.md
            echo "" >> ../comment.md
            echo "> ${desc}" >> ../comment.md
            echo "" >> ../comment.md
            echo "**Author:** ${author}" >> ../comment.md
            echo "" >> ../comment.md

            if [ -f ../base/.github/check_wcag.py ]; then
              python3 ../base/.github/check_wcag.py --markdown "$theme_dir" >> ../comment.md
            fi

            if [ -f "${theme_dir}/preview.svg" ]; then
              upload_name="pr-${PR_NUMBER}-${theme_slug}.svg"
              upload_url="https://api.danklinux.com/uploads/${upload_name}"

              if curl --fail -sS -X PUT "$upload_url" \
                  -H "Authorization: Bearer ${UPLOAD_TOKEN}" \
                  -H "Content-Type: image/svg+xml" \
                  --data-binary @"${theme_dir}/preview.svg" \
                  -o /dev/null; then
                echo "![${name}](${upload_url})" >> ../comment.md
                echo "" >> ../comment.md
              else
                echo "_Preview upload failed_" >> ../comment.md
                echo "" >> ../comment.md
              fi
            fi

            echo "---" >> ../comment.md
            echo "" >> ../comment.md
          done

      - name: Post preview comment
        if: steps.preview.outputs.has_changes == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
