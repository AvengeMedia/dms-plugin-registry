name: Nix Prefetch

on:
  push:
    branches:
      - master
  schedule:
    - cron: 0 0 * * *

jobs:
  update:
    if: github.repository == 'AvengeMedia/dms-plugin-registry'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: cachix/install-nix-action@v31

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Generate plugin data
        run: python3 .github/nix_prefetch.py

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Check after plugins-prefetch.json is added to git
      - name: Nix flake check
        run: nix flake check

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          git config user.name "dms-ci[bot]"
          git config user.email "dms-ci[bot]@users.noreply.github.com"
          git commit -m "chore: update nix prefetch data [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
